services:
  postgres:
    image: postgres:16-alpine
    container_name: titoflix-postgres
    environment:
      POSTGRES_DB: titoflix
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d titoflix"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: titoflix-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: titoflix
      MINIO_ROOT_PASSWORD: titoflix-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: titoflix-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 titoflix titoflix-secret; do
        sleep 2;
      done &&
      mc mb --ignore-existing local/titoflix-media
      "

  backend:
    build:
      context: ./backend
    container_name: titoflix-backend
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/titoflix
      JWT_SECRET: cambiame-en-produccion
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      S3_ACCESS_KEY: titoflix
      S3_SECRET_KEY: titoflix-secret
      S3_BUCKET_NAME: titoflix-media
      S3_REGION: us-east-1
      S3_MEDIA_PREFIX: media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    container_name: titoflix-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
